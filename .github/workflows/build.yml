name: Build and Deploy Reveal.js Slides

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate topic index
        run: |
          mkdir -p slides/topics
          ls -1 slides/topics/*.md 2>/dev/null | xargs -I{} basename {} | sort | python3 -c "
          import sys, json
          files = [line.strip() for line in sys.stdin if line.strip()]
          print(json.dumps(files))
          " > slides/topics/_index.json

      - name: Assemble static site
        run: |
          mkdir -p site
          cp index.html presentation.yml site/
          cp -r assets slides site/
          for logo in hak.png htl.png; do
            if [ -f "$logo" ]; then
              cp "$logo" site/
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
